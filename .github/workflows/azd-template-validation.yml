name: AZD Template Validation
on:
  schedule:
    - cron: '30 1 * * 4' # Every Thursday at 7:00 AM IST (1:30 AM UTC)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  template_validation:
    runs-on: ubuntu-latest
    name: azd template validation
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Set timestamp
        run: echo "HHMM=$(date -u +'%H%M')" >> $GITHUB_ENV

      - uses: microsoft/template-validation-action@v0.4.4
        with:
          validateAzd: ${{ vars.TEMPLATE_VALIDATE_AZD }}
          validateTests: ${{ vars.TEMPLATE_VALIDATE_TESTS }}
          useDevContainer: ${{ vars.TEMPLATE_USE_DEV_CONTAINER }}
        id: validation
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: azd-${{ vars.AZURE_ENV_NAME }}-${{ env.HHMM }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_ENV_AI_SERVICE_LOCATION: ${{ vars.AZURE_AI_DEPLOYMENT_LOCATION }}
          AZURE_ENV_GPT_MODEL_CAPACITY: 1
          AZURE_ENV_MODEL_5_4_CAPACITY: 1 # keep low to avoid potential quota issues
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: print result
        run: cat ${{ steps.validation.outputs.resultFile }}